apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: reducednodepolicies.iot.mydomain.com
spec:
  group: iot.mydomain.com
  scope: Cluster
  names:
    plural: reducednodepolicies
    singular: reducednodepolicy
    kind: ReducedNodePolicy
    shortNames:
      - rnp
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                nodeSelector:
                  type: object
                  additionalProperties:
                    type: string
                gracePeriodSeconds:
                  type: integer
                criticalLabelKey:
                  type: string
                maxCPUThreshold:
                  type: integer
                maxMemoryThreshold:
                  type: integer
            status:
              type: object
              properties:
                observedNodes:
                  type: integer
                offlineNodes:
                  type: integer
                lastSync:
                  type: string
                  format: date-time
                nodes:
                  type: object
                  additionalProperties:
                    type: object
                    properties:
                      state:
                        type: string
                      lastHeartbeat:
                        type: string
                        format: date-time
                      cpu:
                        type: string
                      memory:
                        type: string
                      offlineSince:
                        type: string
                        format: date-time
                      degradationExecuted:
                        type: boolean
                      offliineEvents:
                        type: array
                        items:
                          type: string
      subresources:
        status: {}
