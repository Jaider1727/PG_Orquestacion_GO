apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: reduced-node-agent
rules:
  - apiGroups: [""]
    resources: ["nodes", "pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: reduced-node-agent-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: reduced-node-agent
subjects:
  - kind: ServiceAccount
    name: reduced-node-agent
    namespace: default
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: reduced-node-agent
  namespace: default





